server:
  port: 8085

spring:
  application:
    name: maidc-label
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        file-extension: yaml
        shared-configs:
          - data-id: maidc-shared.yaml
            refresh: true
  datasource:
    url: jdbc:postgresql://localhost:5432/maidc?currentSchema=rdr
    username: maidc
    password: maidc123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        default_schema: rdr
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:maidc}
    password: ${RABBITMQ_PASSWORD:maidc123}
    virtual-host: ${RABBITMQ_VHOST:/maidc}
