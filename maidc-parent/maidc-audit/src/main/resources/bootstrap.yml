server:
  port: 8086

spring:
  application:
    name: maidc-audit
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        file-extension: yaml
        shared-configs:
          - data-id: maidc-shared.yaml
            refresh: true
  datasource:
    url: jdbc:postgresql://localhost:5432/maidc?currentSchema=audit
    username: maidc
    password: maidc123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: audit
