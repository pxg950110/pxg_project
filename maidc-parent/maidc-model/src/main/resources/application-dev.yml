server:
  port: 8083

spring:
  application:
    name: maidc-model
  datasource:
    url: jdbc:postgresql://localhost:5432/maidc?currentSchema=model&stringtype=unspecified
    username: maidc
    password: maidc123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: model
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: localhost
      port: 6379
      password: maidc_redis
  rabbitmq:
    host: localhost
    port: 5672
    username: maidc
    password: maidc123
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        username: nacos
        password: nacos
      config:
        import-check:
          enabled: false

minio:
  endpoint: http://localhost:9000
  accessKey: maidc
  secretKey: maidc12345
  secure: false

maidc:
  jwt:
    secret: maidc-jwt-secret-key-2026-change-in-production

logging:
  level:
    com.maidc: INFO
