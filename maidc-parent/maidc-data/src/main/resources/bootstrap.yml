server:
  port: 8082

spring:
  application:
    name: maidc-data
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        username: nacos
        password: nacos
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        username: nacos
        password: nacos
        file-extension: yaml
        import-check:
          enabled: false
        shared-configs:
          - data-id: maidc-shared.yaml
            refresh: true
