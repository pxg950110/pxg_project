server:
  port: 8080

spring:
  application:
    name: maidc-gateway
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        file-extension: yaml
        namespace: ${NACOS_NAMESPACE:}
        shared-configs:
          - data-id: maidc-shared.yaml
            refresh: true

logging:
  level:
    com.maidc: INFO
    org.springframework.cloud.gateway: INFO
