# MAIDC Auth 服务配置
# Nacos Data ID: maidc-auth-dev.yaml  Group: DEFAULT_GROUP

server:
  port: 8081

spring:
  application:
    name: maidc-auth
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:maidc-nacos:8848}
      config:
        server-addr: ${NACOS_ADDR:maidc-nacos:8848}
        file-extension: yaml
        shared-configs:
          - data-id: maidc-shared.yaml
            refresh: true
  jpa:
    properties:
      hibernate:
        default_schema: system
  datasource:
    url: jdbc:postgresql://${PG_HOST:maidc-postgres}:${PG_PORT:5432}/maidc?currentSchema=system&stringtype=unspecified

maidc:
  auth:
    max-login-attempts: 5
    lock-duration-ms: 1800000
    password-min-length: 8
