# MAIDC 公共配置 - 所有微服务共享
# Nacos Data ID: maidc-shared.yaml  Group: DEFAULT_GROUP

spring:
  data:
    redis:
      host: ${REDIS_HOST:maidc-redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:maidc_redis}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms

  rabbitmq:
    host: ${RABBITMQ_HOST:maidc-rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:maidc}
    password: ${RABBITMQ_PASSWORD:maidc123}
    virtual-host: ${RABBITMQ_VHOST:maidc}
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: manual
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000

  datasource:
    url: jdbc:postgresql://${PG_HOST:maidc-postgres}:${PG_PORT:5432}/maidc?currentSchema=${spring.application.name:model}&stringtype=unspecified
    username: ${PG_USER:maidc}
    password: ${PG_PASSWORD:maidc123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: ${spring.application.name:model}
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

minio:
  endpoint: ${MINIO_ENDPOINT:http://maidc-minio:9000}
  accessKey: ${MINIO_ACCESS_KEY:maidc}
  secretKey: ${MINIO_SECRET_KEY:maidc12345}
  secure: false

maidc:
  jwt:
    secret: ${JWT_SECRET:maidc-jwt-secret-key-2026-change-in-production}
    access-expiration: ${JWT_ACCESS_EXPIRATION:7200000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

logging:
  pattern:
    console: "[%d{yyyy-MM-dd HH:mm:ss.SSS}] [traceId:%X{traceId}] [userId:%X{userId}] [orgId:%X{orgId}] %-5level %logger{36} - %msg%n"
  level:
    com.maidc: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
