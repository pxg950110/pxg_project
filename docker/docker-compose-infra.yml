version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: maidc-postgres
    environment:
      POSTGRES_DB: maidc
      POSTGRES_USER: maidc
      POSTGRES_PASSWORD: maidc123
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maidc -d maidc"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: maidc-redis
    command: redis-server --requirepass maidc_redis --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "maidc_redis", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: maidc-minio
    environment:
      MINIO_ROOT_USER: maidc
      MINIO_ROOT_PASSWORD: maidc12345
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: maidc-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: maidc
      RABBITMQ_DEFAULT_PASS: maidc123
      RABBITMQ_DEFAULT_VHOST: maidc
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: maidc-nacos
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: embedded
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_TOKEN: "SecretKey012345678901234567890123456789012345678901234567890123456789"
      NACOS_AUTH_IDENTITY_KEY: serverIdentity
      NACOS_AUTH_IDENTITY_VALUE: security
    ports:
      - "8848:8848"
      - "9848:9848"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8848/nacos/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  miniodata:
  rabbitmqdata:
